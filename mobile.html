<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#06080f">
<title>PlaneSpotter Sky</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  :root {
    --bg: #06080f;
    --surface: #0c1019;
    --surface2: #131a27;
    --border: #1c2536;
    --text: #edf0f7;
    --text-dim: #5a6a82;
    --text-muted: #3a4760;
    --accent: #38bdf8;
    --arriving: #34d399;
    --departing: #f472b6;
    --passing: #fbbf24;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh; height: 100dvh;
    overflow: hidden;
  }

  /* Permission screen */
  .perm-screen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 200; padding: 40px 32px; text-align: center;
    transition: opacity 0.5s;
  }
  .perm-screen.hidden { opacity: 0; pointer-events: none; }
  .perm-icon { width: 56px; height: 56px; margin-bottom: 20px; opacity: 0.7; }
  .perm-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
  .perm-desc { font-size: 14px; color: var(--text-dim); line-height: 1.6; max-width: 300px; margin-bottom: 28px; }
  .perm-btn {
    background: var(--accent); color: var(--bg); border: none;
    padding: 16px 48px; border-radius: 14px; font-size: 16px; font-weight: 700;
    font-family: 'Inter', sans-serif; cursor: pointer; transition: transform 0.15s;
  }
  .perm-btn:active { transform: scale(0.96); }
  .perm-note { margin-top: 14px; font-size: 11px; color: var(--text-muted); }
  .perm-desktop-msg {
    display: none; margin-top: 20px; padding: 12px 20px; background: var(--surface2);
    border-radius: 10px; font-size: 12px; color: var(--text-dim); line-height: 1.5;
  }

  /* App container */
  #app { display: none; flex-direction: column; height: 100vh; height: 100dvh; }
  #app.active { display: flex; }

  /* Compass bar */
  .compass-wrap { height: 40px; flex-shrink: 0; position: relative; overflow: hidden; z-index: 10; }
  #compassBar { width: 100%; height: 100%; display: block; }

  /* Map fills everything between compass and card */
  .map-wrap { flex: 1; position: relative; z-index: 1; min-height: 0; }
  #map { width: 100%; height: 100%; }
  .map-wrap .leaflet-container { background: var(--bg) !important; }
  .map-wrap .leaflet-control-zoom { display: none; }
  .map-wrap .leaflet-control-attribution { font-size: 8px; opacity: 0.2; }

  /* Top-left overlay on map */
  .map-status {
    position: absolute; top: 8px; left: 8px; z-index: 1000;
    background: rgba(6,8,15,0.85); backdrop-filter: blur(10px);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 12px; font-size: 11px; display: flex; align-items: center; gap: 6px;
  }
  .map-status .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--arriving); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .map-status .count { font-family: 'JetBrains Mono', monospace; color: var(--text-dim); }

  /* Top-right links */
  .map-links {
    position: absolute; top: 8px; right: 8px; z-index: 1000;
    display: flex; gap: 6px;
  }
  .map-link {
    background: rgba(6,8,15,0.85); backdrop-filter: blur(10px);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 10px; font-size: 11px; color: var(--accent);
    text-decoration: none; font-family: 'Inter', sans-serif;
  }

  /* Focus card */
  .focus-card {
    flex-shrink: 0; background: var(--surface); border-top: 1px solid var(--border);
    padding: 12px 16px; z-index: 10;
    transition: opacity 0.3s;
  }
  .fc-empty { text-align: center; color: var(--text-muted); font-size: 13px; padding: 8px 0; }
  .fc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .fc-main { flex: 1; min-width: 0; }
  .fc-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 2px; }
  .fc-city { font-size: 24px; font-weight: 800; letter-spacing: -0.8px; line-height: 1.1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .fc-flag { font-size: 18px; margin-right: 2px; vertical-align: middle; }
  .fc-route-line { display: flex; align-items: center; gap: 5px; margin-top: 4px; font-size: 11px; color: var(--text-dim); flex-wrap: wrap; }
  .fc-airline { font-weight: 600; color: var(--text); }
  .fc-codes { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 3px; }
  .fc-codes span { color: var(--text); }
  .fc-detail-row {
    display: flex; align-items: center; gap: 10px; margin-top: 6px; padding-top: 6px;
    border-top: 1px solid var(--border); font-size: 11px; color: var(--text-dim); flex-wrap: wrap;
  }
  .fc-detail-row .fc-chip {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    background: var(--surface2); padding: 2px 7px; border-radius: 6px;
  }
  .fc-detail-row .fc-chip .val { color: var(--text); font-weight: 500; }
  .fc-stats-col {
    display: flex; flex-direction: column; align-items: flex-end; gap: 1px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); flex-shrink: 0;
  }
  .fc-stats-col .val { color: var(--text); font-weight: 500; }
  .fc-stats-col .unit { font-size: 9px; }

  .c-arr { color: var(--arriving); }
  .c-dep { color: var(--departing); }
  .c-pass { color: var(--passing); }

  /* Dark popup */
  .dark-popup .leaflet-popup-content-wrapper { background:rgba(6,8,15,0.92); color:var(--text); border:1px solid var(--border); border-radius:10px; font-family:'Inter',sans-serif; }
  .dark-popup .leaflet-popup-tip { background:rgba(6,8,15,0.92); }
  .dark-popup .leaflet-popup-close-button { color:var(--text-dim); }
</style>
</head>
<body>

<div class="perm-screen" id="permScreen">
  <svg class="perm-icon" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5">
    <path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.4-.1.9.3 1.1L11 12l-2 3H6l-1 1 3 2 2 3 1-1v-3l3-2 3.7 7.3c.2.4.7.5 1.1.3l.5-.3c.4-.2.6-.6.5-1.1z"/>
  </svg>
  <div class="perm-title">PlaneSpotter Sky</div>
  <div class="perm-desc">Point your phone toward a plane to see where it's coming from.</div>
  <button class="perm-btn" onclick="startApp()">Start Scanning</button>
  <div class="perm-note">Requires location &amp; compass access</div>
  <div class="perm-desktop-msg" id="desktopMsg">
    Desktop mode: move mouse left/right to change heading.<br><br>
    <a href="index.html" style="color:var(--accent)">Open Desktop Dashboard &rarr;</a>
  </div>
</div>

<div id="app">
  <div class="compass-wrap"><canvas id="compassBar"></canvas></div>
  <div class="map-wrap">
    <div id="map"></div>
    <div class="map-status">
      <div class="dot"></div>
      <span id="statusText">Locating...</span>
      <span class="count" id="flightCountLabel"></span>
    </div>
    <div class="map-links">
      <a href="index.html" class="map-link">Dashboard</a>
    </div>
  </div>
  <div class="focus-card" id="focusCard">
    <div class="fc-empty">Point toward a plane to identify it</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ============================================================
//  CONFIG
// ============================================================
const RANGE_KM = 90;
const SKY_FOV = 120;
const CONE_KM = 25; // heading cone length on map
const CONE_FOV = 30; // cone half-angle for "pointing at"
const DEFAULT_LAT = 40.6825;
const DEFAULT_LON = -73.9715;

let userLat = null, userLon = null;
let heading = 0, smoothHeading = 0;
let isDesktop = false;
let flights = [];
let focusedCallsign = null;
const routeCache = {};

// ============================================================
//  UTILS
// ============================================================
function haversine(lat1,lon1,lat2,lon2) {
  const R=6371,d=Math.PI/180,dLa=(lat2-lat1)*d,dLo=(lon2-lon1)*d;
  const a=Math.sin(dLa/2)**2+Math.cos(lat1*d)*Math.cos(lat2*d)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function calcBearing(lat1,lon1,lat2,lon2) {
  const d=Math.PI/180,dL=(lon2-lon1)*d;
  const y=Math.sin(dL)*Math.cos(lat2*d);
  const x=Math.cos(lat1*d)*Math.sin(lat2*d)-Math.sin(lat1*d)*Math.cos(lat2*d)*Math.cos(dL);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}
function destPoint(lat,lon,brg,dist) {
  const R=6371,d=dist/R,br=brg*Math.PI/180,la=lat*Math.PI/180,lo=lon*Math.PI/180;
  const la2=Math.asin(Math.sin(la)*Math.cos(d)+Math.cos(la)*Math.sin(d)*Math.cos(br));
  const lo2=lo+Math.atan2(Math.sin(br)*Math.sin(d)*Math.cos(la),Math.cos(d)-Math.sin(la)*Math.sin(la2));
  return {lat:la2*180/Math.PI,lon:lo2*180/Math.PI};
}
function countryFlag(iso) {
  if(!iso)return'';
  return[...iso.toUpperCase()].map(c=>String.fromCodePoint(0x1F1E6+c.charCodeAt(0)-65)).join('');
}
function classifyMotion(track,bearing) {
  if(track===null)return'passing';
  const d=Math.abs(((track-(bearing+180)%360+540)%360)-180);
  return d<50?'approaching':d>130?'receding':'passing';
}

// ============================================================
//  SENSORS
// ============================================================
function startApp() {
  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(
      pos => {
        userLat = pos.coords.latitude;
        userLon = pos.coords.longitude;
        document.getElementById('statusText').textContent = `${userLat.toFixed(4)}°, ${userLon.toFixed(4)}°`;
        fetchFlights();
      },
      () => { userLat=DEFAULT_LAT; userLon=DEFAULT_LON; document.getElementById('statusText').textContent='Default location'; fetchFlights(); },
      { enableHighAccuracy: true, maximumAge: 5000 }
    );
  } else { userLat=DEFAULT_LAT; userLon=DEFAULT_LON; }

  if (typeof DeviceOrientationEvent!=='undefined' && typeof DeviceOrientationEvent.requestPermission==='function') {
    DeviceOrientationEvent.requestPermission().then(s => { if(s==='granted') window.addEventListener('deviceorientation',handleOrientation,true); }).catch(()=>enableDesktopFallback());
  } else if ('DeviceOrientationEvent' in window) {
    window.addEventListener('deviceorientation',handleOrientation,true);
    setTimeout(()=>{ if(!window._gotOrientation) enableDesktopFallback(); },1500);
  } else { enableDesktopFallback(); }

  document.getElementById('permScreen').classList.add('hidden');
  document.getElementById('app').classList.add('active');
  initMap();
  loadDemoFlights();
  requestAnimationFrame(animLoop);
}

function handleOrientation(e) {
  window._gotOrientation = true;
  heading = e.webkitCompassHeading !== undefined ? e.webkitCompassHeading : e.alpha !== null ? (360-e.alpha)%360 : heading;
}
function enableDesktopFallback() {
  isDesktop = true;
  document.getElementById('desktopMsg').style.display = 'block';
  heading = 304; smoothHeading = 304;
  document.addEventListener('mousemove', e => { heading = (e.clientX / window.innerWidth * 360) % 360; });
}

// ============================================================
//  COMPASS BAR
// ============================================================
let compassCtx = null, compassW = 0, compassH = 0;

function initCompassBar() {
  const canvas = document.getElementById('compassBar');
  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio||1;
  compassW = rect.width; compassH = rect.height;
  canvas.width = compassW*dpr; canvas.height = compassH*dpr;
  canvas.style.width = compassW+'px'; canvas.style.height = compassH+'px';
  compassCtx = canvas.getContext('2d');
  compassCtx.scale(dpr, dpr);
}

function drawCompassBar() {
  if (!compassCtx) initCompassBar();
  const ctx = compassCtx, W = compassW, H = compassH;
  if (W === 0) return;
  const pxD = W/SKY_FOV, cx = W/2;

  ctx.fillStyle='#0a0f1a'; ctx.fillRect(0,0,W,H);

  for(let deg=-360;deg<=720;deg++){
    const rel=((deg-smoothHeading+540)%360)-180;
    if(Math.abs(rel)>SKY_FOV/2+5)continue;
    const x=cx+rel*pxD, nd=((deg%360)+360)%360;
    if(deg%5===0){
      const isC=nd%90===0, isM=deg%30===0;
      ctx.strokeStyle=isC?'rgba(255,255,255,0.35)':isM?'rgba(255,255,255,0.15)':'rgba(255,255,255,0.06)';
      ctx.lineWidth=isC?1.5:1; ctx.beginPath();
      ctx.moveTo(x,isC?2:isM?H*0.3:H*0.45); ctx.lineTo(x,H*0.65); ctx.stroke();
    }
    const cards={0:'N',90:'E',180:'S',270:'W'};
    if(cards[nd]){ ctx.font='600 11px JetBrains Mono'; ctx.fillStyle=nd===0?'#f87171':'rgba(255,255,255,0.5)'; ctx.textAlign='center'; ctx.fillText(cards[nd],x,H*0.88); }
    else if(nd%30===0){ ctx.font='500 8px JetBrains Mono'; ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.textAlign='center'; ctx.fillText(nd+'°',x,H*0.85); }
  }
  ctx.fillStyle='#38bdf8'; ctx.beginPath(); ctx.moveTo(cx,0); ctx.lineTo(cx-5,7); ctx.lineTo(cx+5,7); ctx.fill();

  const fw=40;
  let fl=ctx.createLinearGradient(0,0,fw,0); fl.addColorStop(0,'#0a0f1a'); fl.addColorStop(1,'transparent'); ctx.fillStyle=fl; ctx.fillRect(0,0,fw,H);
  let fr=ctx.createLinearGradient(W-fw,0,W,0); fr.addColorStop(0,'transparent'); fr.addColorStop(1,'#0a0f1a'); ctx.fillStyle=fr; ctx.fillRect(W-fw,0,fw,H);
}

// ============================================================
//  MAP
// ============================================================
let map = null;
let flightMarkers = [];
let headingCone = null;
let headingArrow = null;
let myMarker = null;
let trackedLine = null;

function initMap() {
  const lat = userLat||DEFAULT_LAT, lon = userLon||DEFAULT_LON;
  map = L.map('map', { center:[lat,lon], zoom:10, zoomControl:false, attributionControl:true });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution:'&copy; OSM', maxZoom:18 }).addTo(map);

  // My location
  const myIcon = L.divIcon({
    html:'<div style="width:14px;height:14px;background:#38bdf8;border-radius:50%;border:2px solid #06080f;box-shadow:0 0 14px rgba(56,189,248,0.5)"></div>',
    className:'', iconSize:[14,14], iconAnchor:[7,7]
  });
  myMarker = L.marker([lat,lon], { icon:myIcon, zIndexOffset:1000 }).addTo(map);

  // Heading cone (will be updated in animLoop)
  headingCone = L.polygon([], { color:'rgba(56,189,248,0.25)', fillColor:'rgba(56,189,248,0.06)', weight:1, dashArray:'4 4' }).addTo(map);
  headingArrow = L.polyline([], { color:'#38bdf8', weight:2, opacity:0.6 }).addTo(map);
}

function updateHeadingCone() {
  if (!map || !headingCone) return;
  const lat = userLat||DEFAULT_LAT, lon = userLon||DEFAULT_LON;
  const pts = [[lat,lon]];
  for (let a = smoothHeading-CONE_FOV; a <= smoothHeading+CONE_FOV; a += 3) {
    const p = destPoint(lat, lon, a, CONE_KM);
    pts.push([p.lat, p.lon]);
  }
  pts.push([lat,lon]);
  headingCone.setLatLngs(pts);

  // Arrow line along heading center
  const tip = destPoint(lat, lon, smoothHeading, CONE_KM * 0.85);
  headingArrow.setLatLngs([[lat,lon],[tip.lat,tip.lon]]);
}

// Stores {callsign -> {marker, color, flight}} for lightweight highlight updates
const markerMap = new Map();

function updateMapMarkers() {
  if (!map) return;
  // Full rebuild — only called when flight data changes (every 15s)
  flightMarkers.forEach(m => map.removeLayer(m));
  flightMarkers = [];
  markerMap.clear();
  if (trackedLine) { map.removeLayer(trackedLine); trackedLine = null; }

  flights.forEach(f => {
    const color = f.motion==='approaching'?'#34d399':f.motion==='receding'?'#f472b6':'#fbbf24';
    const rot = f.track || 0;
    const icon = L.divIcon({
      html:`<div class="plane-icon" style="transform:rotate(${rot}deg)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="${color}" opacity="0.65">
          <path d="M12 2L8 10l-6 2 2 1 4-1v5l-2 3h2l2-2 2 2h2l-2-3v-5l4 1 2-1-6-2z"/>
        </svg>
      </div>`,
      className:'', iconSize:[18,18], iconAnchor:[9,9]
    });

    const marker = L.marker([f.lat,f.lon], { icon }).addTo(map);
    marker.on('click', () => {
      focusedCallsign = f.callsign;
      updateFocusCard();
      highlightTracked();
    });

    const routeInfo = f.route ? `<b>${f.route.airline||''}</b> ${f.route.flightNumber||''}<br>${f.route.origin?.city||'?'} → ${f.route.destination?.city||'?'}` : '';
    marker.bindPopup(`<div style="font-family:Inter;font-size:12px;">
      <div style="font-family:JetBrains Mono;font-weight:600;color:${color};font-size:13px;">${f.callsign}</div>
      ${routeInfo?'<div style="margin-top:4px">'+routeInfo+'</div>':''}
      <div style="margin-top:4px;font-family:JetBrains Mono;font-size:11px;color:#94a3b8">${f.altitude?Math.round(f.altitude).toLocaleString()+' ft':''} · ${f.speed?Math.round(f.speed)+' kt':''} · ${Math.round(f.distance)} km</div>
    </div>`, { className:'dark-popup' });

    flightMarkers.push(marker);
    markerMap.set(f.callsign, { marker, color, flight: f });
  });

  highlightTracked();
}

// Lightweight highlight update — no DOM teardown, just swap icon + line
function highlightTracked() {
  if (!map) return;
  if (trackedLine) { map.removeLayer(trackedLine); trackedLine = null; }

  for (const [cs, entry] of markerMap) {
    const isT = cs === focusedCallsign;
    const { marker, color, flight: f } = entry;
    const rot = f.track || 0;
    const sz = isT ? 26 : 18;
    const newIcon = L.divIcon({
      html:`<div style="transform:rotate(${rot}deg);display:flex;align-items:center;justify-content:center;${isT?'filter:drop-shadow(0 0 6px '+color+')':''}">
        <svg width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="${color}" opacity="${isT?1:0.65}">
          <path d="M12 2L8 10l-6 2 2 1 4-1v5l-2 3h2l2-2 2 2h2l-2-3v-5l4 1 2-1-6-2z"/>
        </svg>
      </div>`,
      className:'', iconSize:[sz,sz], iconAnchor:[sz/2,sz/2]
    });
    marker.setIcon(newIcon);

    if (isT) {
      trackedLine = L.polyline([[userLat||DEFAULT_LAT,userLon||DEFAULT_LON],[f.lat,f.lon]], {
        color, weight:2, opacity:0.5, dashArray:'6 4'
      }).addTo(map);
    }
  }
}

// ============================================================
//  FOCUS CARD
// ============================================================
function compassDir(deg) {
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg / 22.5) % 16];
}

function updateFocusCard() {
  const card = document.getElementById('focusCard');
  const f = flights.find(fl => fl.callsign === focusedCallsign) || flights[0];
  if (!f) { card.innerHTML = '<div class="fc-empty">Point toward a plane to identify it</div>'; return; }

  const isArr = f.motion==='approaching', isDep = f.motion==='receding';
  const dirClass = isArr?'c-arr':isDep?'c-dep':'c-pass';
  const hasRoute = f.route && f.route.origin;

  // Different display for known vs unknown routes
  const dirLabel = !hasRoute ? 'Tracking' : isArr ? 'Arriving from' : isDep ? 'Departing to' : 'Passing';
  const city = !hasRoute ? f.callsign : isArr?(f.route.origin?.city||f.callsign):isDep?(f.route.destination?.city||f.callsign):(f.route.origin?.city||f.callsign);
  const country = !hasRoute ? '' : isArr?(f.route.origin?.country||''):isDep?(f.route.destination?.country||''):(f.route.origin?.country||'');
  const flag = countryFlag(country);

  const airline = f.route?.airline||'';
  const flightNo = f.route?.flightNumber||f.callsign;
  const oCode = f.route?.origin?.code||'', dCode = f.route?.destination?.code||'';
  const oCity = f.route?.origin?.city||'', dCity = f.route?.destination?.city||'';

  // Compass direction from user to plane
  const bearDir = compassDir(f.bearing);
  // Track heading as compass direction
  const hdgDir = f.track !== null ? compassDir(f.track) : '';

  card.innerHTML = `<div class="fc-top">
    <div class="fc-main">
      <div class="fc-label ${dirClass}">${dirLabel}</div>
      <div class="fc-city">${flag?`<span class="fc-flag">${flag}</span>`:''}${city}</div>
      <div class="fc-route-line">
        ${airline?`<span class="fc-airline">${airline}</span><span style="color:var(--text-muted)">&middot;</span>`:''}
        ${oCode&&dCode?`<span class="fc-codes"><span>${oCode}</span><span style="color:var(--text-muted)">→</span><span>${dCode}</span></span><span style="color:var(--text-muted)">&middot;</span>`:''}
        <span>${flightNo}</span>
        ${!hasRoute?`<span style="color:var(--text-muted);font-size:10px">· route loading...</span>`:''}
      </div>
      ${oCity && dCity ? `<div style="font-size:10px;color:var(--text-muted);margin-top:2px">${oCity} → ${dCity}</div>` : ''}
    </div>
    <div class="fc-stats-col">
      <div><span class="val">${f.distance<1?f.distance.toFixed(1):Math.round(f.distance)}</span> <span class="unit">km ${bearDir}</span></div>
      <div><span class="val">${f.altitude?Math.round(f.altitude).toLocaleString():'-'}</span> <span class="unit">ft</span></div>
      <div><span class="val">${f.speed?Math.round(f.speed):'-'}</span> <span class="unit">kt</span></div>
      ${hdgDir?`<div><span class="val">hdg</span> <span class="unit">${Math.round(f.track)}° ${hdgDir}</span></div>`:''}
    </div>
  </div>
  <div class="fc-detail-row">
    <span class="fc-chip"><span class="val">${Math.round(f.bearing)}°</span> ${bearDir} of you</span>
    ${f.altitude?`<span class="fc-chip"><span class="val">${(f.altitude/5280).toFixed(1)}</span> mi up</span>`:''}
    ${f.speed?`<span class="fc-chip"><span class="val">${Math.round(f.speed*1.151)}</span> mph</span>`:''}
    <span class="fc-chip">${f.callsign}</span>
  </div>`;
}

// ============================================================
//  AUTO-FOCUS: select plane closest to heading
// ============================================================
function autoFocusNearest() {
  let best = null, bestAngle = Infinity;
  flights.forEach(f => {
    const rel = Math.abs(((f.bearing - smoothHeading + 540) % 360) - 180);
    if (rel < bestAngle) { bestAngle = rel; best = f; }
  });
  if (best && best.callsign !== focusedCallsign) {
    focusedCallsign = best.callsign;
    updateFocusCard();
    highlightTracked();
  }
}

// ============================================================
//  ANIMATION LOOP — all at 60fps
// ============================================================
let lastAutoFocus = 0;

function animLoop() {
  // Smooth heading with tighter lerp for responsive feel
  let diff = heading - smoothHeading;
  if (diff > 180) diff -= 360;
  if (diff < -180) diff += 360;
  smoothHeading = ((smoothHeading + diff * 0.3) + 360) % 360;

  drawCompassBar();
  updateHeadingCone();

  // Auto-focus at ~2fps (just focus card + marker highlight, not full rebuild)
  const now = Date.now();
  if (now - lastAutoFocus > 500) {
    lastAutoFocus = now;
    autoFocusNearest();
  }

  requestAnimationFrame(animLoop);
}

// ============================================================
//  DATA FETCHING
// ============================================================
// Fetch with timeout (cellular connections can hang)
function fetchWithTimeout(url, ms = 4000) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(timer));
}

async function lookupRoute(cs) {
  if (routeCache[cs] !== undefined) return routeCache[cs]; // includes cached nulls
  try {
    const r = await fetchWithTimeout(`https://api.adsbdb.com/v0/callsign/${cs}`, 5000);
    if (!r.ok) { routeCache[cs] = null; return null; }
    const d = await r.json();
    const fr = d?.response?.flightroute;
    if (!fr) { routeCache[cs] = null; return null; }
    const route = {
      airline: fr.airline?.name||null, flightNumber: fr.callsign_iata||fr.callsign||null,
      origin: fr.origin?{city:fr.origin.municipality||fr.origin.name,code:fr.origin.iata_code||fr.origin.icao_code,country:fr.origin.country_iso_name}:null,
      destination: fr.destination?{city:fr.destination.municipality||fr.destination.name,code:fr.destination.iata_code||fr.destination.icao_code,country:fr.destination.country_iso_name}:null
    };
    routeCache[cs] = route;
    return route;
  } catch(e) { routeCache[cs] = null; return null; }
}

// Sequential route lookups (parallel chokes mobile connections)
async function lookupRoutesSequential(callsigns) {
  for (const cs of callsigns) {
    if (routeCache[cs] !== undefined) continue;
    const route = await lookupRoute(cs);
    const f = flights.find(fl => fl.callsign === cs);
    if (f && route) {
      f.route = route;
      // Live-update card if this is the focused flight
      if (cs === focusedCallsign) updateFocusCard();
    }
  }
  // Refresh markers + card after all lookups
  updateMapMarkers();
  updateFocusCard();
}

let lastApiFetch = 0, apiBackoff = 15000;

async function fetchFlights() {
  const now = Date.now();
  if (now - lastApiFetch < apiBackoff) return;
  lastApiFetch = now;
  const lat = userLat||DEFAULT_LAT, lon = userLon||DEFAULT_LON;

  try {
    const pad = 1.2;
    const resp = await fetch(`https://opensky-network.org/api/states/all?lamin=${lat-pad}&lomin=${lon-pad}&lamax=${lat+pad}&lomax=${lon+pad}`);
    if (resp.status === 429) { apiBackoff = Math.min(apiBackoff*2, 300000); return; }
    apiBackoff = 15000;
    if (!resp.ok) { loadDemoFlights(); return; }
    const data = await resp.json();
    if (!data.states || !data.states.length) { loadDemoFlights(); return; }

    flights = data.states.filter(s=>s[5]!==null&&s[6]!==null).map(s => {
      const fLat=s[6],fLon=s[5],dist=haversine(lat,lon,fLat,fLon),bearing=calcBearing(lat,lon,fLat,fLon);
      const track=s[10],alt=s[13]!==null?s[13]*3.281:(s[7]!==null?s[7]*3.281:null),spd=s[9]!==null?s[9]*1.944:null;
      return{callsign:(s[1]||'').trim()||'N/A',lat:fLat,lon:fLon,altitude:alt,speed:spd,track,distance:dist,bearing,motion:classifyMotion(track,bearing),route:null};
    }).filter(f=>f.distance<=RANGE_KM).sort((a,b)=>a.distance-b.distance);

    // Apply any cached routes immediately
    flights.forEach(f => { if (routeCache[f.callsign]) f.route = routeCache[f.callsign]; });
    onDataReady();

    // Then look up missing routes sequentially in the background (won't block UI)
    const toLookup = flights.slice(0, 10).filter(f => f.callsign !== 'N/A' && routeCache[f.callsign] === undefined).map(f => f.callsign);
    if (toLookup.length) lookupRoutesSequential(toLookup);
  } catch(e) { loadDemoFlights(); }
}
